<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🏆 WC2026 予想大会</title>
<meta name="apple-mobile-web-app-title" content="WC2026">
<meta name="theme-color" content="#0a0e1a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700;
    --gold2: #FFA500;
    --silver: #C0C0C0;
    --bronze: #CD7F32;
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1f2937;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --green: #22c55e;
    --bottom-nav-h: 64px;
    --header-h: 56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* ===== HEADER ===== */
  .header {
    height: var(--header-h);
    background: linear-gradient(135deg, #0f1520, #1a2035);
    border-bottom: 1px solid rgba(0,212,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
  }
  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-updated {
    position: absolute;
    right: 1rem;
    font-size: 0.62rem;
    color: var(--muted);
  }

  /* ===== SCROLL AREA ===== */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0.75rem 0.75rem calc(var(--bottom-nav-h) + 0.75rem);
  }

  /* ===== BOTTOM NAV ===== */
  .bottom-nav {
    height: var(--bottom-nav-h);
    background: #0d1220;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    flex-shrink: 0;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    color: var(--muted);
    font-size: 0.62rem;
    border: none;
    background: none;
    font-family: 'Noto Sans JP', sans-serif;
    transition: color 0.15s;
  }
  .nav-item .nav-icon { font-size: 1.25rem; line-height: 1; }
  .nav-item.active { color: var(--accent); }

  /* ===== TAB CONTENT ===== */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ===== SECTION TITLE ===== */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 0.75rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid rgba(0,212,255,0.15);
  }

  /* ===== RANKING ===== */
  .ranking-list { display: flex; flex-direction: column; gap: 0.5rem; }

  .rank-card {
    display: grid;
    grid-template-columns: 2rem 1fr auto;
    align-items: center;
    gap: 0.65rem;
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 0.75rem 0.85rem;
    position: relative;
    overflow: hidden;
  }
  .rank-card.rank-1 { border-color: rgba(255,215,0,0.35); background: linear-gradient(135deg, rgba(255,215,0,0.06), var(--bg2)); }
  .rank-card.rank-2 { border-color: rgba(192,192,192,0.25); }
  .rank-card.rank-3 { border-color: rgba(205,127,50,0.25); }
  .rank-card.rank-4 { border-color: rgba(148,163,184,0.15); }

  .rank-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    line-height: 1;
    text-align: center;
  }
  .rank-1 .rank-num { color: var(--gold); }
  .rank-2 .rank-num { color: var(--silver); }
  .rank-3 .rank-num { color: var(--bronze); }
  .rank-4 .rank-num, .rank-card:not(.rank-1):not(.rank-2):not(.rank-3):not(.rank-4) .rank-num { color: var(--muted); }

  .rank-name { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.2rem; }
  .rank-countries { font-size: 0.65rem; color: var(--muted); line-height: 1.7; word-break: break-all; }

  .rank-score {
    text-align: right;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--accent);
    line-height: 1;
  }
  .rank-score-label { font-size: 0.6rem; color: var(--muted); font-family: 'Noto Sans JP', sans-serif; text-align: right; }

  .prize-badge {
    display: inline-block;
    font-size: 0.65rem;
    padding: 0.1rem 0.45rem;
    border-radius: 1rem;
    margin-left: 0.4rem;
    font-weight: 700;
  }
  .prize-1 { background: rgba(255,215,0,0.2); color: var(--gold); border: 1px solid rgba(255,215,0,0.4); }
  .prize-2 { background: rgba(192,192,192,0.15); color: var(--silver); border: 1px solid rgba(192,192,192,0.3); }
  .prize-3 { background: rgba(205,127,50,0.15); color: var(--bronze); border: 1px solid rgba(205,127,50,0.3); }
  .prize-4 { background: rgba(148,163,184,0.12); color: var(--muted); border: 1px solid rgba(148,163,184,0.25); }

  /* ===== PICKS ===== */
  .picks-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .picks-card {
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 0.85rem;
  }
  .picks-card h3 { font-size: 0.88rem; font-weight: 700; margin-bottom: 0.5rem; }
  .picks-countries { display: flex; flex-wrap: wrap; gap: 0.35rem; }
  .country-chip {
    font-size: 0.72rem;
    padding: 0.2rem 0.6rem;
    border-radius: 1rem;
    background: var(--bg3);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--muted);
  }
  .country-chip.has-points {
    background: rgba(0,212,255,0.08);
    border-color: rgba(0,212,255,0.25);
    color: var(--accent);
  }

  /* ===== MATCHES ===== */
  .view-toggle {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 0.75rem;
  }
  .view-btn {
    padding: 0.35rem 1rem;
    border-radius: 2rem;
    border: 1px solid rgba(255,255,255,0.12);
    background: transparent;
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .view-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 700; }

  .group-section { margin-bottom: 1.25rem; }
  .group-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.12em;
    color: var(--gold);
    margin-bottom: 0.5rem;
  }

  .match-row {
    display: flex;
    align-items: center;
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 8px;
    padding: 0.55rem 0.75rem;
    margin-bottom: 0.35rem;
    gap: 0.4rem;
    min-height: 44px;
  }
  .match-left { display: flex; flex-direction: column; flex: 1; }
  .match-dt { font-size: 0.64rem; color: var(--gold); margin-bottom: 0.15rem; }
  .match-team { font-size: 0.82rem; font-weight: 700; }
  .match-team-away { font-size: 0.82rem; font-weight: 700; text-align: right; flex: 1; }
  .match-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.25rem;
    color: var(--accent);
    min-width: 3.5rem;
    text-align: center;
  }
  .match-score.pending { color: var(--muted); font-size: 0.9rem; }

  /* ===== KNOCKOUT ===== */
  .ko-section { display: flex; flex-direction: column; gap: 0.5rem; }
  .ko-round {
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 0.85rem;
  }
  .ko-round-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    color: var(--accent2);
    margin-bottom: 0.5rem;
  }
  .ko-teams { display: flex; flex-wrap: wrap; gap: 0.35rem; }
  .ko-team {
    font-size: 0.72rem;
    padding: 0.2rem 0.6rem;
    border-radius: 1rem;
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.2);
    color: #ffa07a;
  }
  .ko-team.ko-owned {
    background: rgba(0,212,255,0.12);
    border-color: rgba(0,212,255,0.35);
    color: var(--accent);
    font-weight: 700;
  }
  .ko-team.champion {
    background: rgba(255,215,0,0.12);
    border-color: rgba(255,215,0,0.4);
    color: var(--gold);
    font-weight: 700;
    font-size: 0.82rem;
    padding: 0.25rem 0.85rem;
  }

  /* ===== STANDINGS ===== */
  .standings-nav { display: flex; gap: 0.3rem; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 0.4rem; margin-bottom: 0.6rem; scrollbar-width: none; }
  .standings-nav::-webkit-scrollbar { display: none; }
  .standings-nav-btn { flex-shrink: 0; padding: 0.3rem 0.8rem; border-radius: 1rem; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Noto Sans JP', sans-serif; font-size: 0.75rem; cursor: pointer; transition: all 0.15s; }
  .standings-nav-btn.active { background: var(--gold); border-color: var(--gold); color: var(--bg); font-weight: 700; }
  .standing-group { background: var(--bg3); border-radius: 10px; padding: 0.75rem; display: none; }
  .standing-group.active { display: block; }
  .standing-group-label { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--gold); margin-bottom: 0.5rem; letter-spacing: 0.1em; }
  .standing-row { display: flex; align-items: center; gap: 0.4rem; font-size: 0.82rem; padding: 0.3rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .standing-row:last-child { border-bottom: none; }
  .s-rank { color: var(--muted); min-width: 1rem; font-size: 0.75rem; }
  .s-team { flex: 1; font-weight: 700; }
  .s-played { color: var(--muted); min-width: 1.5rem; text-align: center; font-size: 0.72rem; }
  .s-pts { font-weight: 700; min-width: 2rem; text-align: right; font-family: 'Bebas Neue', sans-serif; font-size: 1rem; }
  .s-gd { color: var(--muted); min-width: 2.2rem; text-align: right; font-size: 0.72rem; }

  /* ===== BONUS ===== */
  .bonus-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 0.75rem; }
  .bonus-card {
    background: var(--bg2);
    border: 1px solid rgba(255,215,0,0.15);
    border-radius: 10px;
    padding: 0.85rem;
    text-align: center;
  }
  .bonus-icon { font-size: 1.5rem; margin-bottom: 0.3rem; }
  .bonus-label { font-size: 0.68rem; color: var(--muted); margin-bottom: 0.2rem; }
  .bonus-value { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--gold); }

  /* ===== EMPTY ===== */
  .empty { text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: 0.85rem; }

  /* ===== RANK LABEL ===== */
  .rl { font-size: 0.6rem; margin-left: 2px; }

  /* ===== POPUP ===== */
  .popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .popup-overlay.show { opacity: 1; pointer-events: all; }
  .popup-sheet {
    width: 100%;
    background: var(--bg2);
    border-radius: 18px 18px 0 0;
    padding: 1.25rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom));
    transform: translateY(100%);
    transition: transform 0.25s cubic-bezier(0.32,0.72,0,1);
    border-top: 1px solid var(--border);
  }
  .popup-overlay.show .popup-sheet { transform: translateY(0); }
  .popup-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 1rem; }
  .popup-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--accent); letter-spacing: 0.08em; margin-bottom: 0.2rem; }
  .popup-rank { font-size: 0.75rem; color: var(--muted); margin-bottom: 1rem; }
  .popup-owners { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.5rem; }
  .popup-owner-chip { padding: 0.35rem 0.9rem; border-radius: 2rem; font-size: 0.85rem; font-weight: 700; background: rgba(0,212,255,0.12); border: 1px solid rgba(0,212,255,0.3); color: var(--accent); }
  .popup-none { font-size: 0.85rem; color: var(--muted); padding: 0.5rem 0; }
  .popup-close { width: 100%; margin-top: 1rem; padding: 0.75rem; border-radius: 10px; border: 1px solid var(--border); background: var(--bg3); color: var(--muted); font-family: 'Noto Sans JP', sans-serif; font-size: 0.9rem; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">⚽ WC2026 予想大会</div>
    <div style="font-size:0.58rem;color:var(--muted);text-align:center;letter-spacing:0.05em">賞金総額 7万円 · 7名</div>
  </div>
  <div class="header-updated">更新: <span id="lastUpdated">-</span></div>
</div>

<div class="scroll-area" id="scrollArea">

  <!-- RANKING -->
  <div class="tab-content active" id="tab-ranking">
    <div class="section-title">🏆 ランキング</div>
    <div class="ranking-list" id="rankingList">
      <div class="empty">読み込み中...</div>
    </div>
  </div>

  <!-- PICKS -->
  <div class="tab-content" id="tab-picks">
    <div class="section-title">🌍 選択国</div>
    <div class="picks-list" id="picksList">
      <div class="empty">読み込み中...</div>
    </div>
  </div>

  <!-- MATCHES -->
  <div class="tab-content" id="tab-matches">
    <div class="section-title">⚽ 試合結果</div>
    <div class="view-toggle">
      <button class="view-btn active" id="btnByGroup" onclick="switchMatchView('group', this)">グループ別</button>
      <button class="view-btn" id="btnByDate" onclick="switchMatchView('date', this)">日程順</button>
    </div>
    <div id="matchesList"><div class="empty">読み込み中...</div></div>
  </div>

  <!-- KNOCKOUT -->
  <div class="tab-content" id="tab-knockout">
    <div class="section-title">📊 グループ順位</div>
    <div class="standings-grid" id="standingsList"></div>
    <div class="section-title">🎯 決勝トーナメント</div>
    <div class="ko-section" id="knockoutList"><div class="empty">読み込み中...</div></div>
    <div class="section-title" style="margin-top:0.75rem">🌟 ボーナス</div>
    <div class="bonus-grid" id="bonusDisplay"></div>
  </div>

</div>

<nav class="bottom-nav">
  <button class="nav-item active" onclick="showTab('ranking', this)">
    <span class="nav-icon">🏆</span><span>ランキング</span>
  </button>
  <button class="nav-item" onclick="showTab('picks', this)">
    <span class="nav-icon">🌍</span><span>選択国</span>
  </button>
  <button class="nav-item" onclick="showTab('matches', this)">
    <span class="nav-icon">⚽</span><span>試合</span>
  </button>
  <button class="nav-item" onclick="showTab('knockout', this)">
    <span class="nav-icon">🎯</span><span>決勝T</span>
  </button>
</nav>

<script src="js/scoring.js"></script>
<script>
let appData = null;
let matchViewMode = 'group';

const FIFA_RANKINGS = {"アルゼンチン":1,"スペイン":2,"フランス":3,"イングランド":4,"ポルトガル":5,"ブラジル":6,"モロッコ":7,"オランダ":8,"ベルギー":9,"ドイツ":10,"クロアチア":11,"コロンビア":13,"メキシコ":14,"セネガル":15,"アメリカ":16,"ウルグアイ":17,"日本":18,"スイス":19,"イラン":20,"トルコ":22,"オーストリア":23,"エクアドル":24,"韓国":25,"オーストラリア":27,"アルジェリア":28,"エジプト":29,"カナダ":30,"ノルウェー":31,"コートジボワール":33,"パナマ":34,"スウェーデン":38,"チェコ":39,"パラグアイ":40,"スコットランド":43,"コンゴDR":45,"チュニジア":46,"ウズベキスタン":50,"カタール":55,"イラク":56,"南アフリカ":60,"サウジアラビア":61,"ヨルダン":63,"ボスニア・ヘルツェゴビナ":64,"カーボベルデ":68,"ガーナ":73,"ハイチ":81,"キュラソー":83,"ニュージーランド":85};

function getRankLabel(c) {
  const r = FIFA_RANKINGS[c];
  if (!r) return '';
  const col = r <= 10 ? 'var(--gold)' : r <= 49 ? 'var(--accent)' : 'var(--muted)';
  return `<span class="rl" style="color:${col}">FIFA${r}位</span>`;
}

async function loadData() {
  try {
    const res = await fetch('data/data.json?v=' + Date.now());
    appData = await res.json();
    renderAll();
  } catch(e) {
    document.querySelectorAll('.empty').forEach(el => el.textContent = 'データの読み込みに失敗しました');
  }
}

function showTab(tab, el) {
  document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (el) el.classList.add('active');
  document.getElementById('scrollArea').scrollTop = 0;
}

function renderAll() {
  if (!appData) return;
  renderRanking();
  renderPicks();
  renderMatches();
  renderKnockout();
  document.getElementById('lastUpdated').textContent = new Date().toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

// ===== RANKING =====
function renderRanking() {
  const scored = calcScores(appData);
  const prizes = ['3.5万円','2.5万円','1万円'];
  const el = document.getElementById('rankingList');
  if (!scored.length) { el.innerHTML = '<div class="empty">参加者データがありません</div>'; return; }
  el.innerHTML = scored.map((p, i) => {
    const rank = i + 1;
    const prize = rank <= 3 ? `<span class="prize-badge prize-${rank}">${prizes[rank-1]}</span>` : '';
    const countries = p.countries.length
      ? p.countries.map(c => `${c}${getRankLabel(c)}<span style="color:var(--accent);font-size:0.62rem;margin-left:1px">(${p.breakdown[c]||0})</span>`).join(' · ')
      : '<span style="color:var(--muted)">未登録</span>';
    return `<div class="rank-card rank-${rank}">
      <div class="rank-num">${rank}</div>
      <div>
        <div class="rank-name">${p.name}${prize}</div>
        <div class="rank-countries">${countries}</div>
      </div>
      <div>
        <div class="rank-score">${p.total}</div>
        <div class="rank-score-label">pts</div>
      </div>
    </div>`;
  }).join('');
}

// ===== PICKS =====
function renderPicks() {
  const scored = calcScores(appData);
  const el = document.getElementById('picksList');
  if (!appData.participants.length) { el.innerHTML = '<div class="empty">参加者データがありません</div>'; return; }
  el.innerHTML = scored.map(p => {
    const chips = p.countries.length
      ? p.countries.map(c => {
          const pts = p.breakdown[c] || 0;
          return `<span class="country-chip ${pts>0?'has-points':''}">${c}${getRankLabel(c)}${pts>0?`<span style="color:var(--green);font-size:0.62rem"> +${pts}pt</span>`:''}</span>`;
        }).join('')
      : '<span class="country-chip">未登録</span>';
    return `<div class="picks-card"><h3>${p.name} <span style="font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--accent);margin-left:4px">${p.total}pts</span></h3><div class="picks-countries">${chips}</div></div>`;
  }).join('');
}

// ===== MATCHES =====
function switchMatchView(mode, btn) {
  matchViewMode = mode;
  document.getElementById('btnByGroup').classList.toggle('active', mode === 'group');
  document.getElementById('btnByDate').classList.toggle('active', mode === 'date');
  renderMatches();
}

function buildMatchRow(m, showGroup) {
  const scored = m.played && m.homeScore !== null;
  const dtLabel = m.datetime ? formatDt(m.datetime) : '';
  const now = new Date();
  const matchDt = m.datetime ? new Date(m.datetime.replace(' ','T')+'+09:00') : null;
  const isNext = !m.played && matchDt && matchDt > now;
  const border = isNext ? 'border-left:3px solid var(--accent)' : m.played ? 'border-left:3px solid rgba(34,197,94,0.4)' : '';
  const groupBadge = showGroup ? `<span style="font-size:0.6rem;background:rgba(255,215,0,0.12);color:var(--gold);padding:1px 5px;border-radius:1rem;border:1px solid rgba(255,215,0,0.25);margin-right:3px">G${m.group}</span>` : '';
  return `<div class="match-row" style="${border}">
    <div class="match-left">
      <div class="match-dt">${groupBadge}${dtLabel}</div>
      <div class="match-team" onclick="showCountryPopup('${m.home}')" style="cursor:pointer">${m.home}${getRankLabel(m.home)}</div>
    </div>
    <div class="match-score ${scored?'':'pending'}">${scored ? m.homeScore+' - '+m.awayScore : 'vs'}</div>
    <div class="match-team-away" onclick="showCountryPopup('${m.away}')" style="cursor:pointer">${m.away}${getRankLabel(m.away)}</div>
  </div>`;
}

function renderMatches() {
  const el = document.getElementById('matchesList');
  const { matches } = appData;
  if (!matches.length) { el.innerHTML = '<div class="empty">試合データがまだありません</div>'; return; }

  if (matchViewMode === 'date') {
    const sorted = [...matches].sort((a,b) => (a.datetime||'').localeCompare(b.datetime||''));
    const byDate = {};
    sorted.forEach(m => {
      const key = m.datetime ? m.datetime.slice(0,10) : '未定';
      if (!byDate[key]) byDate[key] = [];
      byDate[key].push(m);
    });
    el.innerHTML = Object.entries(byDate).map(([key, ms]) => {
      let label = '日程未定';
      if (key !== '未定') {
        const d = new Date(key+'T00:00:00+09:00');
        label = `${d.getMonth()+1}/${d.getDate()}(${'日月火水木金土'[d.getDay()]})`;
      }
      return `<div class="group-section">
        <div class="group-label" style="color:var(--accent)">${label}</div>
        ${ms.map(m => buildMatchRow(m, true)).join('')}
      </div>`;
    }).join('');
  } else {
    const byGroup = {};
    matches.forEach(m => { if (!byGroup[m.group]) byGroup[m.group] = []; byGroup[m.group].push(m); });
    const groupOrder = ['A','B','C','D','E','F','G','H','I','J','K','L'];
    const sortedGroups = Object.entries(byGroup).sort((a,b) => groupOrder.indexOf(a[0]) - groupOrder.indexOf(b[0]));
    el.innerHTML = sortedGroups.map(([g, ms]) => {
      const sorted = [...ms].sort((a,b) => (a.datetime||'').localeCompare(b.datetime||''));
      return `<div class="group-section">
        <div class="group-label">グループ ${g}</div>
        ${sorted.map(m => buildMatchRow(m, false)).join('')}
      </div>`;
    }).join('');
  }
}

function showCountryPopup(country) {
  if (!appData) return;
  const owners = appData.participants.filter(p => p.countries.includes(country));
  const rank = FIFA_RANKINGS[country];

  document.getElementById('popupCountry').textContent = country;
  document.getElementById('popupRank').textContent = rank ? `FIFA ${rank}位` : '';

  const ownersEl = document.getElementById('popupOwners');
  if (owners.length) {
    ownersEl.innerHTML = owners.map(p =>
      `<span class="popup-owner-chip">${p.name}</span>`
    ).join('');
  } else {
    ownersEl.innerHTML = '<span class="popup-none">この国を選んでいる参加者はいません</span>';
  }

  document.getElementById('popupOverlay').classList.add('show');
}

function hidePopup() {
  document.getElementById('popupOverlay').classList.remove('show');
}

function closePopup(e) {
  if (e.target === document.getElementById('popupOverlay')) hidePopup();
}

function formatDt(dt) {
  const d = new Date(dt.replace(' ','T')+'+09:00');
  const wd = '日月火水木金土'[d.getDay()];
  return `${d.getMonth()+1}/${d.getDate()}(${wd}) ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ===== KNOCKOUT =====
function calcGroupStandings() {
  const standings = {};
  appData.groups.forEach(g => {
    standings[g.name] = g.teams.map(team => ({ team, pts:0, gf:0, ga:0, gd:0, played:0 }));
  });
  appData.matches.forEach(m => {
    if (!m.played || m.homeScore===null || m.awayScore===null) return;
    const g = standings[m.group]; if (!g) return;
    const home = g.find(t => t.team===m.home);
    const away = g.find(t => t.team===m.away);
    if (!home || !away) return;
    home.played++; away.played++;
    home.gf+=m.homeScore; home.ga+=m.awayScore; home.gd+=m.homeScore-m.awayScore;
    away.gf+=m.awayScore; away.ga+=m.homeScore; away.gd+=m.awayScore-m.homeScore;
    if (m.homeScore>m.awayScore) { home.pts+=3; }
    else if (m.homeScore===m.awayScore) { home.pts+=1; away.pts+=1; }
    else { away.pts+=3; }
  });
  Object.keys(standings).forEach(g => standings[g].sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf));
  return standings;
}

function renderKnockout() {
  const { knockoutResults, bonuses } = appData;
  const standings = calcGroupStandings();

  // グループ順位表（タブ切り替え式）
  const groups = ['A','B','C','D','E','F','G','H','I','J','K','L'];
  const navHtml = groups.map((g,i) =>
    `<button class="standings-nav-btn${i===0?' active':''}" onclick="switchStanding('${g}',this)">G ${g}</button>`
  ).join('');
  const groupsHtml = groups.map((g,i) => {
    const rows = standings[g] || [];
    return `<div class="standing-group${i===0?' active':''}" id="sg-${g}">
      <div class="standing-group-label">グループ ${g}</div>
      ${rows.map((r,i) => {
        const c = i<2?'var(--accent)':i===2?'var(--gold)':'var(--muted)';
        return `<div class="standing-row">
          <span class="s-rank" style="color:${c}">${i+1}</span>
          <span class="s-team" style="color:${c}">${r.team}</span>
          <span class="s-played">${r.played}試</span>
          <span class="s-pts" style="color:${c}">${r.pts}pt</span>
          <span class="s-gd">${r.gd>=0?'+':''}${r.gd}</span>
        </div>`;
      }).join('')}
      <p style="font-size:0.62rem;color:var(--muted);margin-top:0.4rem">🔵 通過圏内　🟡 3位</p>
    </div>`;
  }).join('');
  document.getElementById('standingsList').innerHTML =
    `<div class="standings-nav">${navHtml}</div>${groupsHtml}`;

  // 決勝トーナメント
  const koEl = document.getElementById('knockoutList');
  const roundDefs = [
    { key: 'round_of_32',    label: 'ベスト32',          cols: 2 },
    { key: 'round_of_16',    label: 'ベスト16',          cols: 2 },
    { key: 'quarter_finals', label: 'ベスト8（準々決勝）', cols: 2 },
    { key: 'semi_finals',    label: 'ベスト4（準決勝）',  cols: 2 },
    { key: 'final',          label: '決勝進出',           cols: 2 },
  ];
  let koHtml = roundDefs.map(({ key, label, cols }) => {
    const teams = (knockoutResults[key] || []).filter(Boolean);
    if (!teams.length) return '';
    // 参加者の選択国と照合してハイライト
    const owned = new Set(appData.participants.flatMap(p => p.countries));
    const teamChips = teams.map(t => {
      const isOwned = owned.has(t);
      return `<span class="ko-team${isOwned ? ' ko-owned' : ''}" onclick="showCountryPopup('${t}')" style="cursor:pointer">${t}</span>`;
    }).join('');
    return `<div class="ko-round">
      <div class="ko-round-label">${label} <span style="font-size:0.7rem;color:var(--muted);font-family:'Noto Sans JP',sans-serif">${teams.length}チーム</span></div>
      <div class="ko-teams">${teamChips}</div>
    </div>`;
  }).join('');
  if (knockoutResults.champion) {
    koHtml += `<div class="ko-round" style="border-color:rgba(255,215,0,0.25)">
      <div class="ko-round-label" style="color:var(--gold)">🏆 優勝</div>
      <div class="ko-teams"><span class="ko-team champion" onclick="showCountryPopup('${knockoutResults.champion}')" style="cursor:pointer">👑 ${knockoutResults.champion}</span></div>
    </div>`;
  }
  koEl.innerHTML = koHtml || '<div class="empty">決勝トーナメントはまだ始まっていません</div>';

  // ボーナス・ペナルティ
  document.getElementById('bonusDisplay').innerHTML = `
    <div class="bonus-card">
      <div class="bonus-icon">⚽</div>
      <div class="bonus-label">得点王の所属国</div>
      <div class="bonus-value">${bonuses.topScorer || '未定'}</div>
      <div style="font-size:0.68rem;color:var(--gold);margin-top:0.2rem">＋10点</div>
    </div>
    <div class="bonus-card">
      <div class="bonus-icon">🌟</div>
      <div class="bonus-label">MVPの所属国</div>
      <div class="bonus-value">${bonuses.mvp || '未定'}</div>
      <div style="font-size:0.68rem;color:var(--gold);margin-top:0.2rem">＋10点</div>
    </div>
    <div class="bonus-card" style="border-color:rgba(239,68,68,0.3)">
      <div class="bonus-icon">🟥</div>
      <div class="bonus-label">最多レッドカード国</div>
      <div class="bonus-value" style="color:var(--red)">${bonuses.mostRed || '未定'}</div>
      <div style="font-size:0.68rem;color:var(--red);margin-top:0.2rem">－10点</div>
    </div>
    <div class="bonus-card" style="border-color:rgba(239,68,68,0.3)">
      <div class="bonus-icon">🥅</div>
      <div class="bonus-label">最多失点国</div>
      <div class="bonus-value" style="color:var(--red)">${bonuses.mostConceded || '未定'}</div>
      <div style="font-size:0.68rem;color:var(--red);margin-top:0.2rem">－10点</div>
    </div>`;
}

function switchStanding(g, el) {
  document.querySelectorAll('.standing-group').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.standings-nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sg-' + g).classList.add('active');
  el.classList.add('active');
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

loadData();
</script>
<!-- POPUP -->
<div class="popup-overlay" id="popupOverlay" onclick="closePopup(event)">
  <div class="popup-sheet">
    <div class="popup-handle"></div>
    <div class="popup-title" id="popupCountry"></div>
    <div class="popup-rank" id="popupRank"></div>
    <div class="popup-owners" id="popupOwners"></div>
    <button class="popup-close" onclick="hidePopup()">閉じる</button>
  </div>
</div>
