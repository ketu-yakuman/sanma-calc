<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>三麻精算</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500&display=swap" rel="stylesheet">

<style>

body{
font-family: "Noto Serif JP","Hiragino Mincho ProN","Yu Mincho",serif;
max-width:420px;
margin:auto;
padding:15px;
background:linear-gradient(180deg,#0f5132,#083222);
color:white;
}

h2{
text-align:center;
font-size:26px;
letter-spacing:3px;
font-weight:bold;
color:#f5d76e;
margin-bottom:20px;
}

.card{
background:#f9f9f9;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 6px 12px rgba(0,0,0,0.4);
border:2px solid #ddd;
color:#222;
}

label{
font-weight:bold;
}

input{
width:100%;
font-size:20px;
padding:10px;
margin-bottom:10px;
text-align:center;
border-radius:6px;
border:2px solid #bbb;
background:white;
font-weight:bold;
}

select{
width:100%;
font-size:18px;
padding:8px;
margin-bottom:10px;
}

button{
width:100%;
font-size:20px;
padding:12px;
background:linear-gradient(#d4af37,#b8962e);
color:#222;
border:none;
border-radius:8px;
margin-bottom:10px;
font-weight:bold;
}

button:hover{
opacity:0.9;
}

.checkRow{
display:flex;
justify-content:space-around;
margin-top:5px;
}

.totalCheck{
text-align:center;
padding:6px;
border-radius:6px;
font-weight:bold;
}

.ok{
background:#c8e6c9;
}

.ng{
background:#ffcdd2;
}

.resultBox{
background:#eee;
color:#222;
padding:10px;
border-radius:8px;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
}

th,td{
border:1px solid #aaa;
padding:6px;
text-align:center;
}

</style>
</head>

<body>

<h2>三麻精算</h2>

<div class="card">

<label>プレイヤー</label>
<input id="nameA" value="A">
<input id="nameB" value="B">
<input id="nameC" value="C">

</div>

<div class="card">

<label>持ち点</label>
<input id="scoreA" type="text" value="35000">
<input id="scoreB" type="text" value="35000">
<input id="scoreC" type="text" value="35000">

<div id="sumCheck" class="totalCheck"></div>

</div>

<div class="card">

<label>ウマ</label>

<select id="uma">

<option value="5,10">5-10</option>
<option value="10,20">10-20</option>

</select>

</div>

<div class="card">

<label>焼き鳥</label>

<select id="yakiPoint">
<option value="0">なし</option>
<option value="10000">10000</option>
<option value="20000">20000</option>
</select>

<div class="checkRow">

<label>A<input type="checkbox" id="yakiA"></label>
<label>B<input type="checkbox" id="yakiB"></label>
<label>C<input type="checkbox" id="yakiC"></label>

</div>

</div>

<div class="card">

<label>
<input type="checkbox" id="tobi"> 沈みボーナス
</label>

</div>

<button onclick="calc()">精算</button>
<button onclick="save()">結果保存</button>
<button onclick="next()">次の半荘</button>
<button onclick="resetAll()">合計リセット</button>

<div class="resultBox" id="result"></div>

<h3>半荘結果</h3>

<table id="history">

<tr>
<th>#</th>
<th id="hA">A</th>
<th id="hB">B</th>
<th id="hC">C</th>
</tr>

</table>

<script>

let history=[]
let totals={A:0,B:0,C:0}

function getScore(id){
return parseInt(document.getElementById(id).value)||0
}

function updateSum(){

let a=getScore("scoreA")
let b=getScore("scoreB")
let c=getScore("scoreC")

let sum=a+b+c

let remain=105000-sum

let el=document.getElementById("sumCheck")

if(sum===105000){

el.className="totalCheck ok"
el.innerText="合計 105,000 点（OK）"

}else{

el.className="totalCheck ng"
el.innerText="合計 "+sum.toLocaleString()+" 点（残り "+remain.toLocaleString()+"点）"

}

}

setInterval(updateSum,500)

function calc(){

let scores={
A:getScore("scoreA"),
B:getScore("scoreB"),
C:getScore("scoreC")
}

let names={
A:document.getElementById("nameA").value,
B:document.getElementById("nameB").value,
C:document.getElementById("nameC").value
}

let uma=document.getElementById("uma").value.split(",")
let uma2=parseInt(uma[0])
let uma1=parseInt(uma[1])

let order=Object.keys(scores).sort((a,b)=>scores[b]-scores[a])

let p={A:0,B:0,C:0}

for(let k in scores){
p[k]=(scores[k]-40000)/1000
}

p[order[0]]+=15

p[order[0]]+=uma1
p[order[1]]+=uma2
p[order[2]]-=uma1+uma2

let yakiPoint=parseInt(document.getElementById("yakiPoint").value)/1000

let yaki={
A:document.getElementById("yakiA").checked,
B:document.getElementById("yakiB").checked,
C:document.getElementById("yakiC").checked
}

let payers=[]
let receivers=[]

for(let k in yaki){

if(yaki[k]) payers.push(k)
else receivers.push(k)

}

if(yakiPoint>0 && payers.length>0 && receivers.length>0){

let best=receivers.sort((a,b)=>scores[b]-scores[a])[0]

payers.forEach(k=>{
p[k]-=yakiPoint
p[best]+=yakiPoint
})

}

if(document.getElementById("tobi").checked){

for(let k in scores){

if(scores[k]<0){

p[k]-=20
p[order[0]]+=20

}

}

}

p.A=Math.round(p.A)
p.B=Math.round(p.B)
p.C=Math.round(p.C)

let diff=-(p.A+p.B+p.C)

p[order[0]]+=diff

document.getElementById("result").innerHTML=
names.A+" "+p.A+"<br>"+
names.B+" "+p.B+"<br>"+
names.C+" "+p.C

window.last=p
window.lastNames=names

}

function save(){

if(!window.last)return

history.push(window.last)

totals.A+=window.last.A
totals.B+=window.last.B
totals.C+=window.last.C

let table=document.getElementById("history")

let row=table.insertRow()

row.insertCell().innerText=history.length
row.insertCell().innerText=window.last.A
row.insertCell().innerText=window.last.B
row.insertCell().innerText=window.last.C

}

function next(){

document.getElementById("scoreA").value=35000
document.getElementById("scoreB").value=35000
document.getElementById("scoreC").value=35000

}

function resetAll(){

history=[]
totals={A:0,B:0,C:0}

let table=document.getElementById("history")

table.innerHTML=
"<tr><th>#</th><th>A</th><th>B</th><th>C</th></tr>"

}

</script>

</body>
</html>
