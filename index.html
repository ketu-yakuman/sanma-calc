<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🏆 WC2026 予想大会</title>
<meta name="apple-mobile-web-app-title" content="WC2026">
<meta name="theme-color" content="#0a0e1a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700;
    --gold2: #FFA500;
    --silver: #C0C0C0;
    --bronze: #CD7F32;
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1f2937;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --green: #22c55e;
    --bottom-nav-h: 64px;
    --header-h: 56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* ===== HEADER ===== */
  .header {
    height: var(--header-h);
    background: linear-gradient(135deg, #0f1520, #1a2035);
    border-bottom: 1px solid rgba(0,212,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
  }
  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-updated {
    position: absolute;
    right: 1rem;
    font-size: 0.62rem;
    color: var(--muted);
  }

  /* ===== SCROLL AREA ===== */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0.75rem 0.75rem calc(var(--bottom-nav-h) + 0.75rem);
  }

  /* ===== BOTTOM NAV ===== */
  .bottom-nav {
    height: var(--bottom-nav-h);
    background: #0d1220;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    flex-shrink: 0;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    color: var(--muted);
    font-size: 0.62rem;
    border: none;
    background: none;
    font-family: 'Noto Sans JP', sans-serif;
    transition: color 0.15s;
  }
  .nav-item .nav-icon { font-size: 1.25rem; line-height: 1; }
  .nav-item.active { color: var(--accent); }

  /* ===== TAB CONTENT ===== */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ===== SECTION TITLE ===== */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 0.75rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid rgba(0,212,255,0.15);
  }

  /* ===== RANKING ===== */
  .ranking-list { display: flex; flex-direction: column; gap: 0.5rem; }

  .rank-card {
    display: grid;
    grid-template-columns: 2rem 1fr auto;
    align-items: center;
    gap: 0.65rem;
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 0.75rem 0.85rem;
    position: relative;
    overflow: hidden;
  }
  .rank-card.rank-1 { border-color: rgba(255,215,0,0.35); background: linear-gradient(135deg, rgba(255,215,0,0.06), var(--bg2)); }
  .rank-card.rank-2 { border-color: rgba(192,192,192,0.25); }
  .rank-card.rank-3 { border-color: rgba(205,127,50,0.25); }
  .rank-card.rank-4 { border-color: rgba(148,163,184,0.15); }

  .rank-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    line-height: 1;
    text-align: center;
  }
  .rank-1 .rank-num { color: var(--gold); }
  .rank-2 .rank-num { color: var(--silver); }
  .rank-3 .rank-num { color: var(--bronze); }
  .rank-4 .rank-num, .rank-card:not(.rank-1):not(.rank-2):not(.rank-3):not(.rank-4) .rank-num { color: var(--muted); }

  .rank-name { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.2rem; }
  .rank-countries { font-size: 0.65rem; color: var(--muted); line-height: 1.7; word-break: break-all; }

  .rank-score {
    text-align: right;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--accent);
    line-height: 1;
  }
  .rank-score-label { font-size: 0.6rem; color: var(--muted); font-family: 'Noto Sans JP', sans-serif; text-align: right; }

  .prize-badge {
    display: inline-block;
    font-size: 0.65rem;
    padding: 0.1rem 0.45rem;
    border-radius: 1rem;
    margin-left: 0.4rem;
    font-weight: 700;
  }
  .prize-1 { background: rgba(255,215,0,0.2); color: var(--gold); border: 1px solid rgba(255,215,0,0.4); }
  .prize-2 { background: rgba(192,192,192,0.15); color: var(--silver); border: 1px solid rgba(192,192,192,0.3); }
  .prize-3 { background: rgba(205,127,50,0.15); color: var(--bronze); border: 1px solid rgba(205,127,50,0.3); }
  .prize-4 { background: rgba(148,163,184,0.12); color: var(--muted); border: 1px solid rgba(148,163,184,0.25); }

  /* ===== PICKS ===== */
  .picks-table { width: 100%; border-collapse: collapse; }
  .picks-table th {
    font-size: 0.68rem;
    color: var(--muted);
    font-weight: 700;
    padding: 0.4rem 0.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    text-align: left;
    white-space: nowrap;
  }
  .picks-table th.pts-col { text-align: right; color: var(--accent); }
  .picks-table td {
    padding: 0.55rem 0.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    vertical-align: top;
    font-size: 0.82rem;
  }
  .picks-table tr:last-child td { border-bottom: none; }
  .picks-player-name { font-weight: 700; white-space: nowrap; }
  .picks-player-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    color: var(--accent);
    text-align: right;
    white-space: nowrap;
  }
  .picks-country-row { display: flex; flex-direction: column; gap: 0.25rem; }
  .picks-country-item { display: flex; align-items: center; gap: 0.3rem; font-size: 0.78rem; }
  .picks-country-name { flex: 1; }
  .picks-country-pts {
    font-size: 0.7rem;
    color: var(--green);
    font-weight: 700;
    white-space: nowrap;
  }
  .picks-country-item.has-pts .picks-country-name { color: var(--text); font-weight: 400; }
  .picks-country-item:not(.has-pts) .picks-country-name { color: var(--muted); font-weight: 400; }
  .picks-country-penalty { font-size: 0.7rem; color: var(--red); font-weight: 700; white-space: nowrap; }

  /* ===== MATCHES ===== */
  .view-toggle {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 0.75rem;
  }
  .view-btn {
    padding: 0.35rem 1rem;
    border-radius: 2rem;
    border: 1px solid rgba(255,255,255,0.12);
    background: transparent;
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .view-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 700; }

  .group-section { margin-bottom: 1.25rem; }
  .group-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.12em;
    color: var(--gold);
    margin-bottom: 0.5rem;
  }

  .match-row {
    display: flex;
    align-items: center;
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 8px;
    padding: 0.55rem 0.75rem;
    margin-bottom: 0.35rem;
    gap: 0.4rem;
    min-height: 44px;
  }
  .match-left { display: flex; flex-direction: column; flex: 1; }
  .match-dt { font-size: 0.64rem; color: var(--gold); margin-bottom: 0.15rem; }
  .match-team { font-size: 0.82rem; font-weight: 700; }
  .match-team-away { font-size: 0.82rem; font-weight: 700; text-align: right; flex: 1; }
  .match-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.25rem;
    color: var(--accent);
    min-width: 3.5rem;
    text-align: center;
  }
  .match-score.pending { color: var(--muted); font-size: 0.9rem; }

  /* ===== KNOCKOUT ===== */
  .ko-section { display: flex; flex-direction: column; gap: 0.5rem; }
  .ko-round {
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 0.85rem;
  }
  .ko-round-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    color: var(--accent2);
    margin-bottom: 0.5rem;
  }
  .ko-teams { display: flex; flex-wrap: wrap; gap: 0.35rem; }
  .ko-team {
    font-size: 0.72rem;
    padding: 0.2rem 0.6rem;
    border-radius: 1rem;
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.2);
    color: #ffa07a;
  }
  .ko-team.ko-owned {
    background: rgba(0,212,255,0.12);
    border-color: rgba(0,212,255,0.35);
    color: var(--accent);
    font-weight: 700;
  }
  .ko-team.champion {
    background: rgba(255,215,0,0.12);
    border-color: rgba(255,215,0,0.4);
    color: var(--gold);
    font-weight: 700;
    font-size: 0.82rem;
    padding: 0.25rem 0.85rem;
  }

  /* ===== STANDINGS ===== */
  .standings-nav { display: flex; gap: 0.3rem; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 0.4rem; margin-bottom: 0.6rem; scrollbar-width: none; }
  .standings-nav::-webkit-scrollbar { display: none; }
  .standings-nav-btn { flex-shrink: 0; padding: 0.3rem 0.8rem; border-radius: 1rem; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Noto Sans JP', sans-serif; font-size: 0.75rem; cursor: pointer; transition: all 0.15s; }
  .standings-nav-btn.active { background: var(--gold); border-color: var(--gold); color: var(--bg); font-weight: 700; }
  .standing-group { background: var(--bg3); border-radius: 10px; padding: 0.75rem; display: none; }
  .standing-group.active { display: block; }
  .standing-group-label { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--gold); margin-bottom: 0.5rem; letter-spacing: 0.1em; }
  .standing-row { display: flex; align-items: center; gap: 0.4rem; font-size: 0.82rem; padding: 0.3rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .standing-row:last-child { border-bottom: none; }
  .s-rank { color: var(--muted); min-width: 1rem; font-size: 0.75rem; }
  .s-team { flex: 1; font-weight: 700; }
  .s-played { color: var(--muted); min-width: 1.5rem; text-align: center; font-size: 0.72rem; }
  .s-pts { font-weight: 700; min-width: 2rem; text-align: right; font-family: 'Bebas Neue', sans-serif; font-size: 1rem; }
  .s-gd { color: var(--muted); min-width: 2.2rem; text-align: right; font-size: 0.72rem; }

  /* ===== BONUS ===== */
  .bonus-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 0.75rem; }
  .bonus-card {
    background: var(--bg2);
    border: 1px solid rgba(255,215,0,0.15);
    border-radius: 10px;
    padding: 0.85rem;
    text-align: center;
  }
  .bonus-icon { font-size: 1.5rem; margin-bottom: 0.3rem; }
  .bonus-label { font-size: 0.68rem; color: var(--muted); margin-bottom: 0.2rem; }
  .bonus-value { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--gold); }

  /* ===== EMPTY ===== */
  .empty { text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: 0.85rem; }

  /* ===== RANK LABEL ===== */
  .rl { font-size: 0.6rem; margin-left: 2px; }

  /* ===== POPUP ===== */
  .popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .popup-overlay.show { opacity: 1; pointer-events: all; }
  .popup-sheet {
    width: 100%;
    background: var(--bg2);
    border-radius: 18px 18px 0 0;
    padding: 1.25rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom));
    transform: translateY(100%);
    transition: transform 0.25s cubic-bezier(0.32,0.72,0,1);
    border-top: 1px solid var(--border);
  }
  .popup-overlay.show .popup-sheet { transform: translateY(0); }
  .popup-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 1rem; }
  .popup-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--accent); letter-spacing: 0.08em; margin-bottom: 0.2rem; }
  .popup-rank { font-size: 0.75rem; color: var(--muted); margin-bottom: 1rem; }
  .popup-owners { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.5rem; }
  .popup-owner-chip { padding: 0.35rem 0.9rem; border-radius: 2rem; font-size: 0.85rem; font-weight: 700; background: rgba(0,212,255,0.12); border: 1px solid rgba(0,212,255,0.3); color: var(--accent); }
  .popup-none { font-size: 0.85rem; color: var(--muted); padding: 0.5rem 0; }
  .popup-close { width: 100%; margin-top: 1rem; padding: 0.75rem; border-radius: 10px; border: 1px solid var(--border); background: var(--bg3); color: var(--muted); font-family: 'Noto Sans JP', sans-serif; font-size: 0.9rem; cursor: pointer; }

  /* ===== BRACKET ===== */
  .bracket-round-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin: 1rem 0 0.5rem;
    padding-bottom: 0.3rem;
    border-bottom: 1px solid rgba(0,212,255,0.2);
  }
  .bracket-match {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.6rem 0.75rem;
    margin-bottom: 0.5rem;
    position: relative;
    overflow: hidden;
  }
  .bracket-match-date {
    font-size: 0.65rem;
    color: var(--muted);
    margin-bottom: 0.35rem;
  }
  .bracket-match-num {
    font-size: 0.6rem;
    color: var(--muted);
    position: absolute;
    top: 0.4rem;
    right: 0.6rem;
  }
  .bracket-team {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.3rem 0;
    font-size: 0.88rem;
    font-weight: 700;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
  }
  .bracket-team:last-child { border-bottom: none; }
  .bracket-team.winner { color: var(--gold); }
  .bracket-team.tbd { color: var(--muted); font-weight: 400; font-style: italic; }
  .bracket-team.owned { color: var(--accent); }
  .bracket-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    min-width: 1.5rem;
    text-align: center;
  }
  .bracket-team-name { flex: 1; }
  .bracket-match.decided { border-left: 3px solid var(--gold); }
  .bracket-match.in-progress { border-left: 3px solid var(--green); }

</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">⚽ WC2026 予想大会</div>
    <div style="font-size:0.58rem;color:var(--muted);text-align:center;letter-spacing:0.05em">賞金総額 7万円 · 7名</div>
  </div>
  <div class="header-updated">更新: <span id="lastUpdated">-</span></div>
</div>

<div class="scroll-area" id="scrollArea">

  <!-- RANKING -->
  <div class="tab-content active" id="tab-ranking">
    <div class="section-title">🏆 ランキング</div>
    <div class="ranking-list" id="rankingList">
      <div class="empty">読み込み中...</div>
    </div>
  </div>

  <!-- PICKS -->
  <div class="tab-content" id="tab-picks">
    <div class="section-title">🌍 選択国</div>
    <div id="picksList">
      <div class="empty">読み込み中...</div>
    </div>
  </div>

  <!-- MATCHES -->
  <div class="tab-content" id="tab-matches">
    <div class="section-title">📊 グループ順位</div>
    <div class="standings-grid" id="standingsList"></div>
    <div class="section-title" style="margin-top:1rem">⚽ 試合結果</div>
    <div class="view-toggle">
      <button class="view-btn active" id="btnByGroup" onclick="switchMatchView('group', this)">グループ別</button>
      <button class="view-btn" id="btnByDate" onclick="switchMatchView('date', this)">日程順</button>
    </div>
    <div id="matchesList"><div class="empty">読み込み中...</div></div>
  </div>

  <!-- KNOCKOUT -->
  <div class="tab-content" id="tab-knockout">
    <div class="view-toggle" style="margin-bottom:0.75rem">
      <button class="view-btn" id="btnKOList" onclick="switchKOView('kolist', this)">進出国</button>
      <button class="view-btn active" id="btnKOMatches" onclick="switchKOView('matches', this)">試合結果</button>
      <button class="view-btn" id="btnKOBracket" onclick="switchKOView('bracket', this)">組合せ表</button>
    </div>
    <!-- 進出国リスト -->
    <div id="ko-kolist" style="display:none">
      <div class="section-title">🎯 決勝トーナメント</div>
      <div class="ko-section" id="knockoutList"><div class="empty">読み込み中...</div></div>
      <div class="section-title" style="margin-top:0.75rem">🌟 ボーナス</div>
      <div class="bonus-grid" id="bonusDisplay"></div>
    </div>
    <!-- 試合結果 -->
    <div id="ko-matches" style="display:none">
      <div class="section-title">⚽ 決勝T 試合結果</div>
      <div id="knockoutMatchesList"><div class="empty">読み込み中...</div></div>
    </div>
    <!-- 組合せ表 -->
    <div id="ko-bracket" style="display:none">
      <div class="section-title">🏆 組合せ表</div>
      <p style="font-size:0.72rem;color:var(--muted);margin-bottom:0.75rem">PC・タブレット推奨（横スクロール対応）</p>
      <div id="bracketContainer"></div>
    </div>
  </div>

</div>

<nav class="bottom-nav">
  <button class="nav-item active" onclick="showTab('ranking', this)">
    <span class="nav-icon">🏆</span><span>ランキング</span>
  </button>
  <button class="nav-item" onclick="showTab('picks', this)">
    <span class="nav-icon">🌍</span><span>選択国</span>
  </button>
  <button class="nav-item" onclick="showTab('matches', this)">
    <span class="nav-icon">⚽</span><span>予選</span>
  </button>
  <button class="nav-item" onclick="showTab('knockout', this)">
    <span class="nav-icon">🎯</span><span>決勝T</span>
  </button>
</nav>

<script src="js/scoring.js"></script>
<script>
let appData = null;
let matchViewMode = 'group';

const FIFA_RANKINGS = {"アルゼンチン":1,"スペイン":2,"フランス":3,"イングランド":4,"ポルトガル":5,"ブラジル":6,"モロッコ":7,"オランダ":8,"ベルギー":9,"ドイツ":10,"クロアチア":11,"コロンビア":13,"メキシコ":14,"セネガル":15,"アメリカ":16,"ウルグアイ":17,"日本":18,"スイス":19,"イラン":20,"トルコ":22,"オーストリア":23,"エクアドル":24,"韓国":25,"オーストラリア":27,"アルジェリア":28,"エジプト":29,"カナダ":30,"ノルウェー":31,"コートジボワール":33,"パナマ":34,"スウェーデン":38,"チェコ":39,"パラグアイ":40,"スコットランド":43,"コンゴDR":45,"チュニジア":46,"ウズベキスタン":50,"カタール":55,"イラク":56,"南アフリカ":60,"サウジアラビア":61,"ヨルダン":63,"ボスニア・ヘルツェゴビナ":64,"カーボベルデ":68,"ガーナ":73,"ハイチ":81,"キュラソー":83,"ニュージーランド":85};

function getRankLabel(c) {
  const r = FIFA_RANKINGS[c];
  if (!r) return '';
  const col = r <= 10 ? 'var(--gold)' : r <= 49 ? 'var(--accent)' : 'var(--muted)';
  return `<span class="rl" style="color:${col}">FIFA${r}位</span>`;
}

async function loadData() {
  try {
    const res = await fetch('data/data.json?v=' + Date.now());
    appData = await res.json();
    renderAll();
  } catch(e) {
    document.querySelectorAll('.empty').forEach(el => el.textContent = 'データの読み込みに失敗しました');
  }
}

function showTab(tab, el) {
  document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (el) el.classList.add('active');
  document.getElementById('scrollArea').scrollTop = 0;
  // 決勝Tタブを開いた時に試合結果を描画
  if (tab === 'knockout' && appData) {
    renderKnockoutMatches();
    setTimeout(scrollToNextKOMatch, 50);
  }
}

function renderAll() {
  if (!appData) return;
  renderRanking();
  renderPicks();
  renderMatches();
  renderKnockout();
  document.getElementById('lastUpdated').textContent = new Date().toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

// ===== RANKING =====
function renderRanking() {
  const scored = calcScores(appData);
  const prizes = ['3.5万円','2.5万円','1万円'];
  const el = document.getElementById('rankingList');
  if (!scored.length) { el.innerHTML = '<div class="empty">参加者データがありません</div>'; return; }
  el.innerHTML = scored.map((p, i) => {
    const rank = i + 1;
    const prize = rank <= 3 ? `<span class="prize-badge prize-${rank}">${prizes[rank-1]}</span>` : '';
    const countries = p.countries.length
      ? p.countries.map(c => `${c}${getRankLabel(c)}<span style="color:var(--accent);font-size:0.62rem;margin-left:1px">(${p.breakdown[c]||0})</span>`).join(' · ')
      : '<span style="color:var(--muted)">未登録</span>';
    return `<div class="rank-card rank-${rank}">
      <div class="rank-num">${rank}</div>
      <div>
        <div class="rank-name">${p.name}${prize}</div>
        <div class="rank-countries">${countries}</div>
      </div>
      <div>
        <div class="rank-score">${p.total}</div>
        <div class="rank-score-label">pts</div>
      </div>
    </div>`;
  }).join('');
}

// ===== PICKS =====
function renderPicks() {
  const scored = calcScores(appData);
  const el = document.getElementById('picksList');
  if (!appData.participants.length) { el.innerHTML = '<div class="empty">参加者データがありません</div>'; return; }

  const prizes = ['3.5万円','2.5万円','1万円'];
  const prizeColors = ['var(--gold)','var(--silver)','var(--bronze)'];

  const rows = scored.map((p, i) => {
    const rank = i + 1;
    const prizeHtml = rank <= 3
      ? `<span style="font-size:0.6rem;color:${prizeColors[rank-1]};margin-left:3px">${prizes[rank-1]}</span>`
      : '';

    const countryRows = p.countries.length
      ? p.countries.map(c => {
          const pts = p.breakdown[c] || 0;
          const hasPts = pts > 0;
          // ペナルティ国チェック
          const isPenaltyRed = appData.bonuses.mostRed === c;
          const isPenaltyConceded = appData.bonuses.mostConceded === c;
          const rankLabel = getRankLabel(c);
          let ptLabel = '';
          if (hasPts) ptLabel += `<span class="picks-country-pts">+${pts}pt</span>`;
          if (isPenaltyRed) ptLabel += `<span class="picks-country-penalty">🟥-10</span>`;
          if (isPenaltyConceded) ptLabel += `<span class="picks-country-penalty">🥅-10</span>`;
          return `<div class="picks-country-item${hasPts?' has-pts':''}">
            <span class="picks-country-name">${c}${rankLabel}</span>
            ${ptLabel}
          </div>`;
        }).join('')
      : '<span style="color:var(--muted);font-size:0.75rem">未登録</span>';

    return `<tr>
      <td>
        <div class="picks-player-name">${rank}. ${p.name}${prizeHtml}</div>
      </td>
      <td><div class="picks-country-row">${countryRows}</div></td>
      <td class="picks-player-pts">${p.total}<span style="font-size:0.6rem;font-family:'Noto Sans JP',sans-serif;color:var(--muted)">pt</span></td>
    </tr>`;
  }).join('');

  el.innerHTML = `<table class="picks-table">
    <thead>
      <tr>
        <th style="width:5rem">参加者</th>
        <th>選択国</th>
        <th class="pts-col">得点</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ===== MATCHES =====
function switchMatchView(mode, btn) {
  matchViewMode = mode;
  document.getElementById('btnByGroup').classList.toggle('active', mode === 'group');
  document.getElementById('btnByDate').classList.toggle('active', mode === 'date');
  renderMatches();
  if (mode === 'date') setTimeout(scrollToTodayMatch, 50);
}

function scrollToTodayMatch() {
  const todayKey = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Tokyo' });
  const dates = [...new Set(
    appData.matches.map(m => m.datetime ? m.datetime.slice(0, 10) : null).filter(Boolean).sort()
  )];
  if (!dates.length) return;
  // 今日以降で最初の試合日、なければ初日
  const targetDate = dates.find(d => d >= todayKey) || dates[0];
  const el = document.getElementById('date-' + targetDate);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function buildMatchRow(m, showGroup) {
  const scored = m.played && m.homeScore !== null;
  const dtLabel = m.datetime ? formatDt(m.datetime) : '';
  const now = new Date();
  const matchDt = m.datetime ? new Date(m.datetime.replace(' ','T')+'+09:00') : null;
  const isNext = !m.played && matchDt && matchDt > now;
  const border = isNext ? 'border-left:3px solid var(--accent)' : m.played ? 'border-left:3px solid rgba(34,197,94,0.4)' : '';
  const groupBadge = showGroup ? `<span style="font-size:0.6rem;background:rgba(255,215,0,0.12);color:var(--gold);padding:1px 5px;border-radius:1rem;border:1px solid rgba(255,215,0,0.25);margin-right:3px">G${m.group}</span>` : '';
  return `<div class="match-row" style="${border}">
    <div class="match-left">
      <div class="match-dt">${groupBadge}${dtLabel}</div>
      <div class="match-team" onclick="showCountryPopup('${m.home}')" style="cursor:pointer">${m.home}${getRankLabel(m.home)}</div>
    </div>
    <div class="match-score ${scored?'':'pending'}">${scored ? m.homeScore+' - '+m.awayScore : 'vs'}</div>
    <div class="match-team-away" onclick="showCountryPopup('${m.away}')" style="cursor:pointer">${m.away}${getRankLabel(m.away)}</div>
  </div>`;
}

function renderMatches() {
  const el = document.getElementById('matchesList');
  const { matches } = appData;
  if (!matches.length) { el.innerHTML = '<div class="empty">試合データがまだありません</div>'; return; }

  if (matchViewMode === 'date') {
    const sorted = [...matches].sort((a,b) => (a.datetime||'').localeCompare(b.datetime||''));
    const byDate = {};
    sorted.forEach(m => {
      const key = m.datetime ? m.datetime.slice(0,10) : '未定';
      if (!byDate[key]) byDate[key] = [];
      byDate[key].push(m);
    });
    el.innerHTML = Object.entries(byDate).map(([key, ms]) => {
      let label = '日程未定';
      if (key !== '未定') {
        const d = new Date(key+'T00:00:00+09:00');
        label = `${d.getMonth()+1}/${d.getDate()}(${'日月火水木金土'[d.getDay()]})`;
      }
      return `<div class="group-section" id="date-${key}">
        <div class="group-label" style="color:var(--accent)">${label}</div>
        ${ms.map(m => buildMatchRow(m, true)).join('')}
      </div>`;
    }).join('');
  } else {
    const byGroup = {};
    matches.forEach(m => { if (!byGroup[m.group]) byGroup[m.group] = []; byGroup[m.group].push(m); });
    const groupOrder = ['A','B','C','D','E','F','G','H','I','J','K','L'];
    const sortedGroups = Object.entries(byGroup).sort((a,b) => groupOrder.indexOf(a[0]) - groupOrder.indexOf(b[0]));
    el.innerHTML = sortedGroups.map(([g, ms]) => {
      const sorted = [...ms].sort((a,b) => (a.datetime||'').localeCompare(b.datetime||''));
      return `<div class="group-section">
        <div class="group-label">グループ ${g}</div>
        ${sorted.map(m => buildMatchRow(m, false)).join('')}
      </div>`;
    }).join('');
  }
}

function showCountryPopup(country) {
  if (!appData) return;
  const owners = appData.participants.filter(p => p.countries.includes(country));
  const rank = FIFA_RANKINGS[country];

  document.getElementById('popupCountry').textContent = country;
  document.getElementById('popupRank').textContent = rank ? `FIFA ${rank}位` : '';

  const ownersEl = document.getElementById('popupOwners');
  if (owners.length) {
    ownersEl.innerHTML = owners.map(p =>
      `<span class="popup-owner-chip">${p.name}</span>`
    ).join('');
  } else {
    ownersEl.innerHTML = '<span class="popup-none">この国を選んでいる参加者はいません</span>';
  }

function hidePopup() {
  document.getElementById('popupOverlay').classList.remove('show');
}

function closePopup(e) {
  if (e.target === document.getElementById('popupOverlay')) hidePopup();
}

function formatDt(dt) {
  const d = new Date(dt.replace(' ','T')+'+09:00');
  const wd = '日月火水木金土'[d.getDay()];
  return `${d.getMonth()+1}/${d.getDate()}(${wd}) ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ===== KNOCKOUT =====
function calcGroupStandings() {
  const standings = {};
  appData.groups.forEach(g => {
    standings[g.name] = g.teams.map(team => ({ team, pts:0, gf:0, ga:0, gd:0, played:0 }));
  });
  appData.matches.forEach(m => {
    if (!m.played || m.homeScore===null || m.awayScore===null) return;
    const g = standings[m.group]; if (!g) return;
    const home = g.find(t => t.team===m.home);
    const away = g.find(t => t.team===m.away);
    if (!home || !away) return;
    home.played++; away.played++;
    home.gf+=m.homeScore; home.ga+=m.awayScore; home.gd+=m.homeScore-m.awayScore;
    away.gf+=m.awayScore; away.ga+=m.homeScore; away.gd+=m.awayScore-m.homeScore;
    if (m.homeScore>m.awayScore) { home.pts+=3; }
    else if (m.homeScore===m.awayScore) { home.pts+=1; away.pts+=1; }
    else { away.pts+=3; }
  });
  Object.keys(standings).forEach(g => standings[g].sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf));
  return standings;
}

function switchKOView(view, btn) {

  });

function scrollToNextKOMatch() {
  const container = document.getElementById('knockoutMatchesList');
  if (!container) return;
  const rows = Array.from(container.querySelectorAll('.match-row'));
  if (!rows.length) return;

  const todayKey = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Tokyo' });

  // 未試合かつ日付が今日以降で一番近いものを探す
  let target = rows.find(r =>
    r.dataset.koPlayed === '0' && r.dataset.koDate && r.dataset.koDate >= todayKey
  );
  // 見つからなければ最初の未試合
  if (!target) target = rows.find(r => r.dataset.koPlayed === '0');
  // それも無ければ末尾（全部消化済み）
  if (!target) target = rows[rows.length - 1];

  if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

const KO_ROUND_LABELS_VIEW = {
  round_of_32: 'ベスト32',
  round_of_16: 'ベスト16',
  quarter_finals: '準々決勝（ベスト8）',
  semi_finals: '準決勝（ベスト4）',
  third_place: '3位決定戦',
  final: '決勝'
};

function renderKnockoutMatches() {
  const el = document.getElementById('knockoutMatchesList');
  const matches = appData.knockoutMatches || [];
  if (!matches.length) {
    el.innerHTML = '<div class="empty">試合データがまだありません</div>';
    return;
  }

  const owned = new Set(appData.participants.flatMap(p => p.countries));
  const roundOrder = ['round_of_32','round_of_16','quarter_finals','semi_finals','third_place','final'];
  const byRound = {};
  roundOrder.forEach(r => byRound[r] = []);
  matches.forEach(m => { if (byRound[m.round]) byRound[m.round].push(m); });

  // 試合の勝者を判定
  function getW(m) {
    if (!m || !m.played || m.homeScore === null || m.awayScore === null) return '';
    if (m.homeScore > m.awayScore) return m.home;
    if (m.awayScore > m.homeScore) return m.away;
    if (m.penalties) return m.penalties.home > m.penalties.away ? m.home : m.away;
    return '';
  }

  // R32試合データを対戦カードで検索（公式ブラケット順を維持するため）
  const r32m = byRound['round_of_32'];
  function findR32(home, away) {
    return r32m.find(m => (m.home === home && m.away === away) || (m.home === away && m.away === home)) || {};
  }
  const leftR32 = [
    findR32('ドイツ','パラグアイ'), findR32('フランス','スウェーデン'),
    findR32('南アフリカ','カナダ'), findR32('オランダ','モロッコ'),
    findR32('ポルトガル','クロアチア'), findR32('スペイン','オーストリア'),
    findR32('アメリカ','ボスニア・ヘルツェゴビナ'), findR32('ベルギー','セネガル'),
  ];
  const rightR32 = [
    findR32('ブラジル','日本'), findR32('コートジボワール','ノルウェー'),
    findR32('メキシコ','エクアドル'), findR32('イングランド','コンゴDR'),
    findR32('アルゼンチン','カーボベルデ'), findR32('オーストラリア','エジプト'),
    findR32('スイス','アルジェリア'), findR32('コロンビア','ガーナ'),
  ];
  const leftR32Winners  = leftR32.map(m => getW(m));
  const rightR32Winners = rightR32.map(m => getW(m));
  const allR32Winners = [...leftR32Winners, ...rightR32Winners];

  // R16試合データから「home/awayがR32勝者ペアと一致する試合」を探す
  const r16m = byRound['round_of_16'];
  function findR16(teamA, teamB) {
    if (!teamA && !teamB) return null;
    return r16m.find(m =>
      (m.home === teamA && m.away === teamB) ||
      (m.home === teamB && m.away === teamA) ||
      (teamA && (m.home === teamA || m.away === teamA)) ||
      (teamB && (m.home === teamB || m.away === teamB))
    ) || null;
  }
  // R32勝者ペア（0-1, 2-3, ...）に対応するR16試合を見つけて home/away を補完
  const r16Pairs = [];
  for (let i = 0; i < allR32Winners.length; i += 2) {
    r16Pairs.push([allR32Winners[i], allR32Winners[i+1]]);
  }
  const r16Enriched = r16Pairs.map(([a, b]) => {
    const match = findR16(a, b);
    if (match) {
      return { ...match, home: match.home || a || '', away: match.away || b || '' };
    }
    // 対応する試合データが見つからない場合は仮想的に日時なしで補完
    return { round: 'round_of_16', date: '', time: '', played: false,
      homeScore: null, awayScore: null, extraTime: false, penalties: null,
      home: a || '', away: b || '' };
  });
  const r16Winners = r16Enriched.map(m => getW(m));

  // QF試合データから「home/awayがR16勝者ペアと一致する試合」を探す
  const qfm = byRound['quarter_finals'];
  function findQF(teamA, teamB) {
    if (!teamA && !teamB) return null;
    return qfm.find(m =>
      (m.home === teamA && m.away === teamB) ||
      (m.home === teamB && m.away === teamA) ||
      (teamA && (m.home === teamA || m.away === teamA)) ||
      (teamB && (m.home === teamB || m.away === teamB))
    ) || null;
  }
  const qfPairs = [];
  for (let i = 0; i < r16Winners.length; i += 2) {
    qfPairs.push([r16Winners[i], r16Winners[i+1]]);
  }
  const qfEnriched = qfPairs.map(([a, b]) => {
    const match = findQF(a, b);
    if (match) return { ...match, home: match.home || a || '', away: match.away || b || '' };
    return { round: 'quarter_finals', date: '', time: '', played: false,
      homeScore: null, awayScore: null, extraTime: false, penalties: null,
      home: a || '', away: b || '' };
  });
  const qfWinners = qfEnriched.map(m => getW(m));

  // SF試合データ
  const sfm = byRound['semi_finals'];
  function findSF(teamA, teamB) {
    if (!teamA && !teamB) return null;
    return sfm.find(m =>
      (m.home === teamA && m.away === teamB) ||
      (m.home === teamB && m.away === teamA) ||
      (teamA && (m.home === teamA || m.away === teamA)) ||
      (teamB && (m.home === teamB || m.away === teamB))
    ) || null;
  }
  const sfPairs = [];
  for (let i = 0; i < qfWinners.length; i += 2) {
    sfPairs.push([qfWinners[i], qfWinners[i+1]]);
  }
  let sfEnriched = sfPairs.map(([a, b]) => {
    const match = findSF(a, b);
    if (match) return { ...match, home: match.home || a || '', away: match.away || b || '' };
    return { round: 'semi_finals', date: '', time: '', played: false,
      homeScore: null, awayScore: null, extraTime: false, penalties: null,
      home: a || '', away: b || '' };
  });
  // QF未確定でも日程だけは表示する（sfEnrichedの中身が全部空＝日付なしダミーの場合、sfmの元データに差し替える）
  const sfHasAnyDate = sfEnriched.some(m => m.date);
  if (!sfHasAnyDate && sfm.length > 0) {
    sfEnriched = sfm.map(m => ({ ...m, home: m.home || '', away: m.away || '' }));
  }
  const sfWinners = sfEnriched.map(m => getW(m));

  // 決勝
  const finm = byRound['final'];
  const finalMatch = finm[0] || { round: 'final', date: '', time: '', played: false,
    homeScore: null, awayScore: null, extraTime: false, penalties: null, home: '', away: '' };
  const finalEnriched = [{
    ...finalMatch,
    home: finalMatch.home || sfWinners[0] || '',
    away: finalMatch.away || sfWinners[1] || '',
  }];

  // 3位決定戦（準決勝の敗者同士）
  const sfLosers = sfEnriched.map(m => {
    const w = getW(m);
    if (!w) return '';
    return m.home === w ? m.away : m.home;
  }).filter(Boolean);
  const tpm = byRound['third_place'];
  const thirdPlaceMatch = tpm[0] || { round: 'third_place', date: '', time: '', played: false,
    homeScore: null, awayScore: null, extraTime: false, penalties: null, home: '', away: '' };
  const thirdPlaceEnriched = [{
    ...thirdPlaceMatch,
    home: thirdPlaceMatch.home || sfLosers[0] || '',
    away: thirdPlaceMatch.away || sfLosers[1] || '',
  }];

  const enrichedByRound = {
    round_of_32: byRound['round_of_32'].filter(m => m.home),
    round_of_16: r16Enriched,
    quarter_finals: qfEnriched,
    semi_finals: sfEnriched,
    third_place: thirdPlaceEnriched,
    final: finalEnriched,
  };

  el.innerHTML = roundOrder.map(round => {
    const ms = enrichedByRound[round];
    if (!ms.length) return '';

    const rows = ms.map(m => {
      const scored = m.played && m.homeScore !== null;
      const d = new Date(m.date + 'T00:00:00+09:00');
      const wd = ['日','月','火','水','木','金','土'][d.getDay()];
      const dateLabel = m.time
        ? `${d.getMonth()+1}/${d.getDate()}(${wd}) ${m.time} JST`
        : m.date ? `${d.getMonth()+1}/${d.getDate()}(${wd})` : '';
      const homeOwned = owned.has(m.home);
      const awayOwned = owned.has(m.away);
      const border = m.played ? 'border-left:3px solid rgba(34,197,94,0.5)' : '';
      const homeName = m.home || '未定';
      const awayName = m.away || '未定';

      let scoreHtml = '';
      if (scored) {
        let label = `${m.homeScore} - ${m.awayScore}`;
        if (m.extraTime) label += '<br><span style="font-size:0.58rem;color:var(--accent)">延長</span>';
        if (m.penalties) label += `<br><span style="font-size:0.58rem;color:var(--gold)">PK ${m.penalties.home}-${m.penalties.away}</span>`;
        scoreHtml = label;
      } else {
        scoreHtml = 'vs';
      }

      const homeStyle = homeOwned ? 'color:var(--accent)' : m.home ? '' : 'color:var(--muted);font-style:italic';
      const awayStyle = awayOwned ? 'color:var(--accent)' : m.away ? '' : 'color:var(--muted);font-style:italic';

      const isNext = !m.played && m.date && new Date(m.date + 'T00:00:00+09:00') >= new Date(new Date().toLocaleDateString('sv-SE',{timeZone:'Asia/Tokyo'}) + 'T00:00:00+09:00');
      return `<div class="match-row" data-ko-date="${m.date||''}" data-ko-played="${m.played?1:0}" style="${border}">
        <div style="display:flex;flex-direction:column;flex:1;min-width:0">
          <span style="font-size:0.68rem;color:var(--gold);margin-bottom:0.15rem">${dateLabel}</span>
          <span class="match-team" style="${homeStyle};cursor:${m.home?'pointer':'default'}" ${m.home?`onclick="showCountryPopup('${m.home}')"`:''}>${m.home?getFlag(m.home):''}${homeName}${m.home?getRankLabel(m.home):''}</span>
        </div>
        <span class="match-score ${scored?'':'pending'}" style="white-space:nowrap;flex-shrink:0">${scoreHtml}</span>
        <div style="display:flex;flex-direction:column;flex:1;min-width:0;align-items:flex-end">
          <span style="font-size:0.68rem;color:transparent;margin-bottom:0.15rem">-</span>
          <span class="match-team-away" style="${awayStyle};cursor:${m.away?'pointer':'default'}" ${m.away?`onclick="showCountryPopup('${m.away}')"`:''}>${awayName}${m.away?getRankLabel(m.away):''}${m.away?getFlag(m.away):''}</span>
        </div>
      </div>`;
    }).join('');

    return `<div class="group-section">
      <div class="group-label" style="color:var(--accent2)">${KO_ROUND_LABELS_VIEW[round]}</div>
      ${rows}
    </div>`;
  }).filter(Boolean).join('') || '<div class="empty">試合データがまだありません</div>';
}

function renderBracketTable() {
  const el = document.getElementById('bracketContainer');
  if (!appData) return;

  const km = appData.knockoutMatches || [];
  const owned = new Set(appData.participants.flatMap(p => p.countries));

  // ラウンド別取得
  const r32m = km.filter(m => m.round === 'round_of_32');
  const r16m = km.filter(m => m.round === 'round_of_16');
  const qfm  = km.filter(m => m.round === 'quarter_finals');
  const sfm  = km.filter(m => m.round === 'semi_finals');
  const finm = km.filter(m => m.round === 'final');

  const r16  = (appData.knockoutResults.round_of_16 || []).filter(Boolean);
  const qf   = (appData.knockoutResults.quarter_finals || []).filter(Boolean);
  const sf   = (appData.knockoutResults.semi_finals || []).filter(Boolean);
  const fin  = (appData.knockoutResults.final || []).filter(Boolean);
  const champ = appData.knockoutResults.champion || '';

  // 公式ブラケット（左サイド上→下）
  // Left: ドイツvパラグアイ, フランスvスウェーデン, 南アフリカvカナダ, オランダvモロッコ
  //       コートジボワールvノルウェー, メキシコvエクアドル, アメリカvボスニア, ベルギーvセネガル
  // Right: ブラジルv日本, イングランドvコンゴDR, ポルトガルvクロアチア, スペインvオーストリア
  //        スイスvアルジェリア, オーストラリアvエジプト, アルゼンチンvカーボベルデ, コロンビアvガーナ

  // knockoutMatchesを対戦カードで検索
  function findMatch(home, away) {
    return r32m.find(m => m.home === home && m.away === away) ||
           r32m.find(m => m.home === away && m.away === home) || {};
  }

  // 左サイド8試合（公式左山・上から順）
  // Germany, France, South Africa, Netherlands, Portugal, Spain, USA, Belgium
  const leftR32 = [
    findMatch('ドイツ', 'パラグアイ'),
    findMatch('フランス', 'スウェーデン'),
    findMatch('南アフリカ', 'カナダ'),
    findMatch('オランダ', 'モロッコ'),
    findMatch('ポルトガル', 'クロアチア'),
    findMatch('スペイン', 'オーストリア'),
    findMatch('アメリカ', 'ボスニア・ヘルツェゴビナ'),
    findMatch('ベルギー', 'セネガル'),
  ];

  // 右サイド8試合（公式右山・上から順）
  // Brazil, Ivory Coast, Mexico, England, Argentina, Australia, Switzerland, Colombia
  const rightR32 = [
    findMatch('ブラジル', '日本'),
    findMatch('コートジボワール', 'ノルウェー'),
    findMatch('メキシコ', 'エクアドル'),
    findMatch('イングランド', 'コンゴDR'),
    findMatch('アルゼンチン', 'カーボベルデ'),
    findMatch('オーストラリア', 'エジプト'),
    findMatch('スイス', 'アルジェリア'),
    findMatch('コロンビア', 'ガーナ'),
  ];

  // ベスト16の対戦：r16mの中から「home/awayがR32勝者ペアと一致する試合」を探して紐付ける
  // （配列の並び順に依存せず、対戦カードの中身で正しく対応付ける）
  function findR16Match(teamA, teamB) {
    if (!teamA && !teamB) return null;
    return r16m.find(m =>
      (m.home === teamA && m.away === teamB) ||
      (m.home === teamB && m.away === teamA) ||
      // 片方しか確定していない場合のフォールバック（home/awayどちらかが一致）
      (teamA && (m.home === teamA || m.away === teamA)) ||
      (teamB && (m.home === teamB || m.away === teamB))
    ) || null;
  }

  // 左右のSF
  const leftSF  = sfm[0] || {};
  const rightSF = sfm[1] || {};
  const finalM  = finm[0] || {};

  // 試合から勝者を取得（スコアから判定）
  function getWinner(m) {
    if (!m || !m.played || m.homeScore === null || m.awayScore === null) return '';
    if (m.homeScore > m.awayScore) return m.home;
    if (m.awayScore > m.homeScore) return m.away;
    // 引き分け→PK勝者
    if (m.penalties) {
      return m.penalties.home > m.penalties.away ? m.home : m.away;
    }
    return '';
  }

  // 各ラウンドの勝者リスト（ブラケット順）
  const leftR32Winners  = leftR32.map(m => getWinner(m));
  const rightR32Winners = rightR32.map(m => getWinner(m));

  // leftR32Winners確定後にR16試合を対応付け
  const leftR16 = [
    findR16Match(leftR32Winners[0], leftR32Winners[1]),
    findR16Match(leftR32Winners[2], leftR32Winners[3]),
    findR16Match(leftR32Winners[4], leftR32Winners[5]),
    findR16Match(leftR32Winners[6], leftR32Winners[7]),
  ];
  const rightR16 = [
    findR16Match(rightR32Winners[0], rightR32Winners[1]),
    findR16Match(rightR32Winners[2], rightR32Winners[3]),
    findR16Match(rightR32Winners[4], rightR32Winners[5]),
    findR16Match(rightR32Winners[6], rightR32Winners[7]),
  ];


  // R16のmatchCardに表示するチーム名：
  // R16試合にhome/awayが入力済みならそれを使い、未入力ならR32勝者を使う
  function makeR16Card(r16match, winnerA, winnerB) {
    const home = (r16match && r16match.home) || winnerA || '';
    const away = (r16match && r16match.away) || winnerB || '';
    const date = r16match ? r16match.date : '';
    const time = r16match ? r16match.time : '';
    const winner = getWinner(r16match || {});
    return { home, away, date, time, _winner: winner };
  }

  // 左サイドR16（R32勝者のペア：0-1, 2-3, 4-5, 6-7）
  const leftR16Cards = [
    makeR16Card(leftR16[0], leftR32Winners[0], leftR32Winners[1]),
    makeR16Card(leftR16[1], leftR32Winners[2], leftR32Winners[3]),
    makeR16Card(leftR16[2], leftR32Winners[4], leftR32Winners[5]),
    makeR16Card(leftR16[3], leftR32Winners[6], leftR32Winners[7]),
  ];
  // 右サイドR16
  const rightR16Cards = [
    makeR16Card(rightR16[0], rightR32Winners[0], rightR32Winners[1]),
    makeR16Card(rightR16[1], rightR32Winners[2], rightR32Winners[3]),
    makeR16Card(rightR16[2], rightR32Winners[4], rightR32Winners[5]),
    makeR16Card(rightR16[3], rightR32Winners[6], rightR32Winners[7]),
  ];

  const leftR16Winners  = leftR16Cards.map(m => m._winner);
  const rightR16Winners = rightR16Cards.map(m => m._winner);

  // QFも同様：home/awayの中身でR16勝者ペアと対応する試合を探す
  function findQFMatch(teamA, teamB) {
    if (!teamA && !teamB) return null;
    return qfm.find(m =>
      (m.home === teamA && m.away === teamB) ||
      (m.home === teamB && m.away === teamA) ||
      (teamA && (m.home === teamA || m.away === teamA)) ||
      (teamB && (m.home === teamB || m.away === teamB))
    ) || null;
  }

  function makeQFCard(qfmatch, winnerA, winnerB) {
    const home = (qfmatch && qfmatch.home) || winnerA || '';
    const away = (qfmatch && qfmatch.away) || winnerB || '';
    const date = qfmatch ? qfmatch.date : '';
    const time = qfmatch ? qfmatch.time : '';
    const winner = getWinner(qfmatch || {});
    return { home, away, date, time, _winner: winner };
  }

  const leftQFCards = [
    makeQFCard(findQFMatch(leftR16Winners[0], leftR16Winners[1]), leftR16Winners[0], leftR16Winners[1]),
    makeQFCard(findQFMatch(leftR16Winners[2], leftR16Winners[3]), leftR16Winners[2], leftR16Winners[3]),
  ];
  const rightQFCards = [
    makeQFCard(findQFMatch(rightR16Winners[0], rightR16Winners[1]), rightR16Winners[0], rightR16Winners[1]),
    makeQFCard(findQFMatch(rightR16Winners[2], rightR16Winners[3]), rightR16Winners[2], rightR16Winners[3]),
  ];

  const leftQFWinners  = leftQFCards.map(m => m._winner);
  const rightQFWinners = rightQFCards.map(m => m._winner);

  // SF：home/awayの中身でQF勝者ペアと対応する試合を探す
  function findSFMatch(teamA, teamB) {
    if (!teamA && !teamB) return null;
    return sfm.find(m =>
      (m.home === teamA && m.away === teamB) ||
      (m.home === teamB && m.away === teamA) ||
      (teamA && (m.home === teamA || m.away === teamA)) ||
      (teamB && (m.home === teamB || m.away === teamB))
    ) || null;
  }

  const leftSFMatch  = findSFMatch(leftQFWinners[0], leftQFWinners[1]) || sfm[0] || null;
  const rightSFMatch = findSFMatch(rightQFWinners[0], rightQFWinners[1]) || sfm[1] || null;

  const leftSFCard  = {
    home: (leftSFMatch && leftSFMatch.home) || leftQFWinners[0] || '',
    away: (leftSFMatch && leftSFMatch.away) || leftQFWinners[1] || '',
    date: leftSFMatch?.date || '', time: leftSFMatch?.time || '',
    _winner: getWinner(leftSFMatch || {})
  };
  const rightSFCard = {
    home: (rightSFMatch && rightSFMatch.home) || rightQFWinners[0] || '',
    away: (rightSFMatch && rightSFMatch.away) || rightQFWinners[1] || '',
    date: rightSFMatch?.date || '', time: rightSFMatch?.time || '',
    _winner: getWinner(rightSFMatch || {})
  };

  // 決勝
  const finalCard = {
    home: (finm[0] && finm[0].home) || leftSFCard._winner || '',
    away: (finm[0] && finm[0].away) || rightSFCard._winner || '',
    date: finm[0]?.date || '', time: finm[0]?.time || '',
  };
  const finalWinner = champ || getWinner(finm[0] || {});

  // 3位決定戦（準決勝の敗者同士）
  const leftSFLoser  = leftSFCard._winner
    ? (leftSFCard.home === leftSFCard._winner ? leftSFCard.away : leftSFCard.home)
    : '';
  const rightSFLoser = rightSFCard._winner
    ? (rightSFCard.home === rightSFCard._winner ? rightSFCard.away : rightSFCard.home)
    : '';
  const tpm = km.filter(m => m.round === 'third_place');
  const thirdPlaceCard = {
    home: (tpm[0] && tpm[0].home) || leftSFLoser || '',
    away: (tpm[0] && tpm[0].away) || rightSFLoser || '',
    date: tpm[0]?.date || '', time: tpm[0]?.time || '',
  };
  const thirdPlaceWinner = appData.knockoutResults.third_place || getWinner(tpm[0] || {});

  function fmtDt(date, time) {
    if (!date) return '';
    const d = new Date(date + 'T00:00:00+09:00');
    const M = d.getMonth()+1, D = d.getDate();
    const wd = ['日','月','火','水','木','金','土'][d.getDay()];
    return time ? `${M}/${D}(${wd})<br>${time}` : `${M}/${D}(${wd})`;
  }

  function teamBox(name, isWinner) {
    if (!name) name = '未定';
    const isOwned = owned.has(name);
    const cls = isWinner ? 'br-winner' : isOwned ? 'br-owned' : '';
    const click = name !== '未定' ? `onclick="showCountryPopup('${name}')"` : '';
    const flag = name !== '未定' ? getFlag(name) : '';
    return `<div class="br-team ${cls}" ${click}>${flag}${name}</div>`;
  }

  function matchCard(m, winner) {
    const home = m.home || '未定';
    const away = m.away || '未定';
    const hWin = winner && winner === home;
    const aWin = winner && winner === away;
    const dt = fmtDt(m.date, m.time);
    return `<div class="br-card">
      ${dt ? `<div class="br-dt">${dt}</div>` : ''}
      ${teamBox(home, hWin)}
      ${teamBox(away, aWin)}
    </div>`;
  }

  function roundCol(matches, winners, cls) {
    const cards = matches.map((m, i) => matchCard(m, winners[i] || ''));
    return `<div class="br-col ${cls}">${cards.join('')}</div>`;
  }

  el.innerHTML = `

.br-col { display:flex; flex-direction:column; justify-content:space-around; min-width:100px; }

.br-col.r16  { min-width:105px; }
.br-col.qf   { min-width:105px; }
.br-col.sf   { min-width:105px; flex-direction:column; justify-content:space-around; }
.br-col.fin  { min-width:120px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; }
.br-col.conn { min-width:10px; display:flex; flex-direction:column; justify-content:space-around; }
.br-conn-line { border-left:1px solid rgba(255,255,255,0.15); height:50%; }
.br-card { display:flex; flex-direction:column; margin:3px 2px; }
.br-dt { font-size:0.58rem; color:var(--gold); margin-bottom:2px; padding-left:2px; line-height:1.3; }
.br-team {
  font-size:0.7rem; font-weight:700;
  padding:3px 5px; margin:1px 0;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:4px; white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis;
  max-width:103px; cursor:pointer;
  transition:opacity 0.15s;
}

  font-family:'Bebas Neue',sans-serif; font-size:0.7rem;

  padding:2px 0 4px;
}

  font-family:'Bebas Neue',sans-serif; font-size:0.65rem;

  letter-spacing:0.05em;
}

  font-family:'Bebas Neue',sans-serif; font-size:1rem;
  color:var(--gold); text-align:center; padding:6px 8px;
  background:rgba(255,215,0,0.1); border:1px solid rgba(255,215,0,0.35);
  border-radius:8px; white-space:nowrap;

  <span><span style="display:inline-block;width:10px;height:10px;background:rgba(255,215,0,0.3);border:1px solid var(--gold);border-radius:2px;margin-right:3px"></span>勝者</span>
  <span><span style="display:inline-block;width:10px;height:10px;background:rgba(0,212,255,0.15);border:1px solid var(--accent);border-radius:2px;margin-right:3px"></span>参加者選択国</span>

    <div style="min-width:120px;font-family:'Bebas Neue',sans-serif;font-size:0.65rem;color:var(--gold);text-align:center">決勝</div>
    <div style="min-width:10px"></div>
    <div style="min-width:105px;font-family:'Bebas Neue',sans-serif;font-size:0.65rem;color:var(--muted);text-align:center">準決勝</div>
    <div style="min-width:10px"></div>
    <div style="min-width:105px;font-family:'Bebas Neue',sans-serif;font-size:0.65rem;color:var(--muted);text-align:center">準々決勝</div>
    <div style="min-width:10px"></div>
    <div style="min-width:105px;font-family:'Bebas Neue',sans-serif;font-size:0.65rem;color:var(--muted);text-align:center">ベスト16</div>
    <div style="min-width:10px"></div>
    <div style="min-width:105px;font-family:'Bebas Neue',sans-serif;font-size:0.65rem;color:var(--muted);text-align:center">ベスト32</div>
  </div>
  <div class="br-wrap">
    ${roundCol(leftR32, leftR32Winners, 'r32')}
    <div class="br-col conn"></div>
    ${roundCol(leftR16Cards, leftR16Winners, 'r16')}
    <div class="br-col conn"></div>
    ${roundCol(leftQFCards, leftQFWinners, 'qf')}
    <div class="br-col conn"></div>
    <div class="br-col sf">${matchCard(leftSFCard, leftSFCard._winner)}</div>
    <div class="br-col conn"></div>
    <div class="br-col fin">
      ${matchCard(finalCard, finalWinner)}
      ${finalWinner ? `<div class="br-champ">👑 ${finalWinner}</div>` : ''}
      <div style="margin-top:0.75rem">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:0.62rem;color:var(--muted);text-align:center;margin-bottom:0.3rem;letter-spacing:0.05em">3位決定戦</div>
        ${matchCard(thirdPlaceCard, thirdPlaceWinner)}
        ${thirdPlaceWinner ? `<div class="br-champ" style="background:rgba(205,127,50,0.12);border-color:rgba(205,127,50,0.4);color:#cd7f32">🥉 ${thirdPlaceWinner}</div>` : ''}
      </div>
    </div>
    <div class="br-col conn"></div>
    <div class="br-col sf">${matchCard(rightSFCard, rightSFCard._winner)}</div>
    <div class="br-col conn"></div>
    ${roundCol(rightQFCards, rightQFWinners, 'qf')}
    <div class="br-col conn"></div>
    ${roundCol(rightR16Cards, rightR16Winners, 'r16')}
    <div class="br-col conn"></div>
    ${roundCol(rightR32, rightR32Winners, 'r32')}
  </div>
</div>
</div>`;
}

const COUNTRY_ISO = {
  "アルゼンチン":"ar","オーストラリア":"au","オーストリア":"at",
  "ベルギー":"be","ボスニア・ヘルツェゴビナ":"ba","ブラジル":"br",
  "カナダ":"ca","カーボベルデ":"cv","コロンビア":"co","コンゴDR":"cd",
  "コートジボワール":"ci","クロアチア":"hr","チェコ":"cz",
  "エクアドル":"ec","エジプト":"eg","イングランド":"gb-eng",
  "フランス":"fr","ガーナ":"gh","ドイツ":"de","ハイチ":"ht",
  "イラク":"iq","イラン":"ir","日本":"jp","ヨルダン":"jo",
  "韓国":"kr","キュラソー":"cw","メキシコ":"mx","モロッコ":"ma",
  "ニュージーランド":"nz","ノルウェー":"no","オランダ":"nl",
  "パナマ":"pa","パラグアイ":"py","ポルトガル":"pt",
  "サウジアラビア":"sa","スコットランド":"gb-sct","セネガル":"sn",
  "南アフリカ":"za","スペイン":"es","スウェーデン":"se","スイス":"ch",
  "チュニジア":"tn","トルコ":"tr","アルジェリア":"dz","アメリカ":"us",
  "ウルグアイ":"uy","ウズベキスタン":"uz","カタール":"qa",
};

function getFlag(country) {
  const iso = COUNTRY_ISO[country];
  if (!iso) return '';
  return `<img src="https://flagcdn.com/16x12/${iso}.png" width="16" height="12" alt="${country}" style="vertical-align:middle;margin-right:3px;border-radius:1px">`;
}

function switchStanding(g, el) {
  document.querySelectorAll('.standing-group').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.standings-nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sg-' + g).classList.add('active');
  el.classList.add('active');
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

loadData();
